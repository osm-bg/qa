name: Build Website

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # every hours at :00
  push:
    branches:
      - master
    paths:
      - 'src/**'
      - '.github/workflows/build.yaml'

permissions:
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download qa-motorway-milestones artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          name: milestones-data
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow_search: true
          repo: osm-bg/qa-motorway-milestones
          path: ./src/routes/motorway-milestones

      - name: Download qa-road-network artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          name: road-network-data
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow_search: true
          repo: osm-bg/qa-road-network
          path: ./src/routes/road-network/data

      - name: Download qa-atp-osm artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          name: brand-data
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow_search: true
          repo: osm-bg/qa-atp-osm
          path: ./static/atp-osm/data

      - name: Download qa-waste-containers artifact
        uses: dawidd6/action-download-artifact@v11
        with:
          name: waste-containers-data
          github_token: ${{secrets.GITHUB_TOKEN}}
          workflow_search: true
          repo: osm-bg/qa-waste-containers
          path: ./src/routes/waste-containers

      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build-github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
